# Release: pushing a tag like v0.2.0 builds the web bundle + signed APK and
# attaches both to a GitHub Release.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   ANDROID_KEYSTORE_BASE64   — release keystore, base64-encoded
#   ANDROID_KEYSTORE_PASSWORD — keystore password
#   ANDROID_KEY_ALIAS         — key alias inside the keystore
#   ANDROID_KEY_PASSWORD      — key password
name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install and test
        run: |
          npm ci
          npm test

      - name: Build web bundle
        run: npm run build

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Derive version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          IFS=. read -r MAJOR MINOR PATCH <<< "$TAG"
          echo "name=$TAG" >> "$GITHUB_OUTPUT"
          echo "code=$((MAJOR * 10000 + MINOR * 100 + PATCH))" >> "$GITHUB_OUTPUT"

      - name: Decode release keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.keystore"

      - name: Build signed APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          npx cap sync android
          cd android
          ./gradlew assembleRelease --no-daemon \
            -PappVersionName="${{ steps.version.outputs.name }}" \
            -PappVersionCode="${{ steps.version.outputs.code }}"

      - name: Package artifacts
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk "subster-${{ steps.version.outputs.name }}.apk"
          (cd dist && zip -qr "../subster-web-${{ steps.version.outputs.name }}.zip" .)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            subster-${{ steps.version.outputs.name }}.apk
            subster-web-${{ steps.version.outputs.name }}.zip
